<!DOCTYPE html>
<html lang="es">
<head>
    <title>🪟 Optimizador Ventanerías Aluminio & Vidrio Templado</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 1200px; margin: 0 auto; padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); }
        input, select { padding: 12px; margin: 5px; border: none; border-radius: 8px; width: 120px; }
        button { 
            padding: 12px 24px; background: #10b981; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #059669; transform: scale(1.05); }
        canvas { 
            border: 2px solid #fff; border-radius: 12px; 
            background: #f8fafc; margin: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .result { background: rgba(16,185,129,0.2); padding: 20px; border-radius: 12px; margin: 20px 0; }
        .piezas-lista { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; max-height: 200px; overflow-y: auto; }
        @media (max-width: 768px) { input { width: 100%; margin: 5px 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪟 <strong>Optimizador Ventanerías</strong></h1>
        <p>Aluminio + Vidrio Templado | Demo educativa GitHub Pages | <em>Proyecto master en camino...</em></p>
        
        <div>
            <h3>📏 Panel base</h3>
            <label>Ancho (mm): <input id="panel_w" value="2440" type="number"></label>
            <label>Alto (mm): <input id="panel_h" value="1220" type="number"></label>
        </div>
        
        <div>
            <h3>🔧 Piezas a cortar</h3>
            <div>
                <label>Nombre: <input id="piece_name" value="Marco"></label>
                <label>Ancho: <input id="piece_w" value="600" type="number"></label>
                <label>Alto: <input id="piece_h" value="400" type="number"></label>
                <button onclick="addPiece()">➕ Agregar pieza</button>
            </div>
            <div id="piezas_lista" class="piezas-lista"></div>
            <button onclick="clearPieces()" style="background: #ef4444;">🗑️ Limpiar</button>
        </div>
        
        <button onclick="optimizar()" style="font-size: 18px; padding: 15px 40px; width: 100%;">
            🧮 OPTIMIZAR CORTES
        </button>
        
        <div id="resultado" class="result" style="display:none;"></div>
        <canvas id="canvas" width="800" height="400" style="display:none;"></canvas>
        
        <div style="margin-top: 40px; text-align: center; font-size: 14px;">
            <p>💡 <strong>Próximamente:</strong> Aluminio lineal • Cotizador • PDF • API Rust ⚡</p>
            <p>Made by Yaotzin Plascencia | Guadalajara, Jalisco</p>
        </div>
    </div>

    <script>
        let pieces = [];
        
        function addPiece() {
            const name = document.getElementById('piece_name').value || 'Pieza';
            const w = parseFloat(document.getElementById('piece_w').value);
            const h = parseFloat(document.getElementById('piece_h').value);
            
            if (w > 0 && h > 0) {
                pieces.push({nombre: name, ancho: w, alto: h});
                updateLista();
                document.getElementById('piece_name').value = '';
                document.getElementById('piece_w').value = '';
                document.getElementById('piece_h').value = '';
            }
        }
        
        function updateLista() {
            const lista = document.getElementById('piezas_lista');
            lista.innerHTML = pieces.map((p, i) => 
                `<div>${p.nombre}: ${p.ancho}x${p.alto}mm <button onclick="removePiece(${i})" style="background:#ef4444;font-size:12px;padding:2px 6px;">X</button></div>`
            ).join('');
        }
        
        function removePiece(index) {
            pieces.splice(index, 1);
            updateLista();
        }
        
        function clearPieces() {
            pieces = [];
            updateLista();
        }
        
        function optimizar() {
            if (pieces.length === 0) {
                alert('Agrega al menos 1 pieza');
                return;
            }
            
            const panel_w = parseFloat(document.getElementById('panel_w').value);
            const panel_h = parseFloat(document.getElementById('panel_h').value);
            
            // Algoritmo Guillotine simple (orden grande→pequeño)
            pieces.sort((a,b) => (b.ancho*b.alto) - (a.ancho*a.alto));
            
            let layouts = [];
            let current_x = 5, current_y = 5; // Margen sierra
            let total_area = 0;
            
            pieces.forEach(p => {
                // Intenta colocar (simplificado)
                if (current_x + p.ancho <= panel_w) {
                    layouts.push({
                        nombre: p.nombre,
                        x: current_x,
                        y: current_y,
                        w: p.ancho,
                        h: p.alto
                    });
                    current_x += p.ancho + 5;
                    total_area += p.ancho * p.alto;
                } else {
                    current_x = 5;
                    current_y += 50; // Nueva fila aproximada
                    layouts.push({
                        nombre: p.nombre + ' (fila2)',
                        x: current_x,
                        y: current_y,
                        w: p.ancho,
                        h: p.alto
                    });
                    current_x += p.ancho + 5;
                    total_area += p.ancho * p.alto;
                }
            });
            
            const eficiencia = Math.min((total_area / (panel_w * panel_h)) * 100, 100);
            const paneles_usados = Math.ceil(current_y / panel_h) || 1;
            
            // Mostrar resultado
            document.getElementById('resultado').innerHTML = `
                <h2>✅ <strong>Optimización completa</strong></h2>
                <p><strong>Eficiencia:</strong> ${eficiencia.toFixed(1)}%</p>
                <p><strong>Paneles usados:</strong> ${paneles_usados}</p>
                <p><strong>Piezas optimizadas:</strong> ${layouts.length}/${pieces.length}</p>
                <details>
                    <summary>📋 Lista detallada</summary>
                    ${layouts.map(l => `<div>${l.nombre}: X${l.x} Y${l.y} ${l.w}x${l.h}mm</div>`).join('')}
                </details>
            `;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('canvas').style.display = 'block';
            
            // Canvas visual
            dibujarCanvas(panel_w, panel_h, layouts);
        }
        
        function dibujarCanvas(panel_w, panel_h, layouts) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const scale = Math.min(800 / panel_w, 400 / panel_h);
            
            canvas.width = panel_w * scale;
            canvas.height = panel_h * scale;
            
            // Fondo panel
            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2);
            
            // Piezas
            layouts.forEach(layout => {
                ctx.fillStyle = `hsl(${Math.random()*360}, 70%, 60%)`;
                ctx.fillRect(layout.x * scale, layout.y * scale, layout.w * scale, layout.h * scale);
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                ctx.strokeRect(layout.x * scale, layout.y * scale, layout.w * scale, layout.h * scale);
                ctx.fillStyle = 'black';
                ctx.font = `${12*scale}px Arial`;
                ctx.fillText(layout.nombre, (layout.x+2) * scale, (layout.y+15) * scale);
            });
        }
    </script>
</body>
</html>
